<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draw Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="join-bar">
        <div class="join-group">
          <input id="room-input" type="text" placeholder="Enter room code" maxlength="20" autocomplete="off" />
          <button id="join-btn" type="button" title="Join Room"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></button>
        </div>
        <div class="join-group">
          <button id="new-room-btn" type="button" title="New Room"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <button id="copy-link" type="button" title="Copy Invite Link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
        </div>
        <div class="join-info">
          <p id="presence" class="status-pill">Connecting...</p>
          <p id="room-code" class="room-text"></p>
        </div>
      </section>

      <header class="topbar">
        <div>
          <h1>Draw Together</h1>
          <p class="subtitle">Share a room code, draw with your bubu.</p>
        </div>
        <div class="tool-wrap" id="modes-wrap">
          <button id="modes-btn" type="button" title="Switch Mode">Modes: <span id="mode-label">Normal</span></button>
          <div class="tool-popup modes-dropdown" id="modes-popup">
            <button id="mode-normal-btn" type="button" class="mode-option">Normal</button>
            <button id="mode-endless-btn" type="button" class="mode-option">"Endless"</button>
          </div>
        </div>
      </header>

      <section class="controls">
        <div class="tool-wrap" id="color-wrap">
          <input id="color" type="color" value="#32cd32" class="color-input-btn" title="Color" />
          <div class="tool-popup" id="color-popup">
            <button id="color-ok" type="button">OK</button>
          </div>
        </div>
        <div class="tool-wrap">
          <button id="brush-btn" type="button" class="tool-btn active" title="Brush"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          <div class="tool-popup" id="brush-popup">
            <select id="brush-style" title="Brush Style">
              <option value="round">Round</option>
              <option value="flat">Flat</option>
              <option value="marker">Marker</option>
              <option value="dry">Dry Brush</option>
              <option value="fan">Fan</option>
            </select>
            <input id="brush" type="range" min="1" max="24" value="4" />
            <span id="brush-value">4px</span>
          </div>
        </div>
        <div class="tool-wrap">
          <button id="color-pick-btn" type="button" class="tool-btn" title="Pick Color"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11 8-8a1.5 1.5 0 0 1 2 0l2 2a1.5 1.5 0 0 1 0 2l-8 8"/><path d="M7 13 3 17a2.1 2.1 0 0 0 3 3l4-4"/><path d="m12 8 4 4"/></svg></button>
        </div>
        <div class="tool-wrap">
          <button id="eraser-btn" type="button" class="tool-btn" title="Eraser"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg></button>
          <div class="tool-popup" id="eraser-popup">
            <input id="eraser-size" type="range" min="4" max="60" value="20" />
            <span id="eraser-size-value">20px</span>
          </div>
        </div>
        <button id="bucket-btn" type="button" title="Fill"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0Z"/><path d="m5 2 5 5"/><path d="M22 20.3c0 .8-.7 1.7-1.5 1.7s-1.5-.9-1.5-1.7c0-1 1.5-2.8 1.5-2.8s1.5 1.8 1.5 2.8Z"/></svg></button>
          <!-- Undo/Redo Buttons -->
          <button id="undo-btn" type="button" class="tool-btn" title="Undo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14H5v-4"/><path d="M20 20a9 9 0 0 0-15-7.5L5 10"/></svg></button>
          <button id="redo-btn" type="button" class="tool-btn" title="Redo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14h4v-4"/><path d="M4 20a9 9 0 0 1 15-7.5L19 10"/></svg></button>
        <div class="tool-wrap" id="layers-wrap">
          <button id="layers-btn" type="button" title="Layers"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg></button>
          <span id="active-layer-label" class="active-layer-label">Layer 0</span>
          <div class="tool-popup" id="layers-popup">
            <div id="layers-list"></div>
            <div class="layers-actions">
              <button id="add-layer-btn" type="button" title="Add Layer">+ Add</button>
              <button id="remove-layer-btn" type="button" title="Remove Layer">− Remove</button>
            </div>
          </div>
        </div>
        <div class="controls-spacer"></div>
        <div class="tool-wrap">
          <button id="download-btn" type="button" title="Download"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
          <div class="tool-popup" id="download-popup">
            <button id="dl-png" type="button">PNG (transparent)</button>
            <button id="dl-jpg" type="button">JPG (with background)</button>
          </div>
        </div>
        <button id="fullscreen-btn" type="button" title="Toggle fullscreen canvas"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
        <button id="toggle-3d-btn" type="button" class="tool-btn" title="Toggle 3D layer view">3D</button>
        <button id="clear" type="button" title="Clear Canvas"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        <button id="dark-toggle" type="button" title="Toggle dark mode">🌙</button>
      </section>

      <section class="canvas-stage">
        <canvas id="board"></canvas>
        <div id="eraser-cursor"></div>
        <div id="view-25d" class="view-25d">
          <div id="scene-25d" class="scene-25d"></div>
        </div>
        <div id="zoom-indicator" class="zoom-indicator">
          <button id="zoom-out-btn" type="button" title="Zoom out">−</button>
          <span id="zoom-level">100%</span>
          <button id="zoom-in-btn" type="button" title="Zoom in">+</button>
          <button id="zoom-reset-btn" type="button" title="Reset view">⌂</button>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
    <script>
      // Sync dark mode and Modes button across pages
      function applyDarkModeSetting() {
        let dark = localStorage.getItem('dark-mode');
        if (dark === null) {
          dark = 'true'; // Default to dark mode
          localStorage.setItem('dark-mode', 'true');
        }
        dark = dark === 'true';
        document.body.classList.toggle('dark', dark);
        document.getElementById('dark-toggle').textContent = dark ? '☀️' : '🌙';
      }
      function setModeLabel(mode) {
        const label = document.getElementById('mode-label');
        if (label) label.textContent = mode === 'endless' ? '"Endless"' : 'Normal';
      }
      function switchMode(mode) {
        localStorage.setItem('draw-mode', mode);
        if (mode === 'endless') {
          window.location.href = 'page2.html';
        } else {
          window.location.href = 'index.html';
        }
      }
      document.addEventListener('DOMContentLoaded', () => {
        applyDarkModeSetting();
        // Set mode label based on page
        setModeLabel(window.location.pathname.endsWith('page2.html') ? 'endless' : 'normal');
        document.getElementById('dark-toggle').addEventListener('click', () => {
          const dark = !document.body.classList.contains('dark');
          localStorage.setItem('dark-mode', dark);
          applyDarkModeSetting();
        });
        document.getElementById('mode-normal-btn').addEventListener('click', () => switchMode('normal'));
        document.getElementById('mode-endless-btn').addEventListener('click', () => switchMode('endless'));
      });
      window.addEventListener('storage', (e) => {
        if (e.key === 'dark-mode') applyDarkModeSetting();
      });
