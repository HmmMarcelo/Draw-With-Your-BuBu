<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draw Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="join-bar">
        <div class="join-group">
          <input id="room-input" type="text" placeholder="Enter room code" maxlength="20" autocomplete="off" />
          <button id="join-btn" type="button">Join Room</button>
        </div>
        <div class="join-group">
          <button id="new-room-btn" type="button">New Room</button>
          <button id="copy-link" type="button">Copy Invite Link</button>
        </div>
        <div class="join-info">
          <p id="presence" class="status-pill">Connecting...</p>
          <p id="room-code" class="room-text"></p>
        </div>
      </section>

      <header class="topbar">
        <div>
          <h1>Draw Together</h1>
          <p class="subtitle">Share a room code, draw with your bubu.</p>
        </div>
        <button id="dark-toggle" type="button" title="Toggle dark mode">🌙</button>
      </header>

      <section class="controls">
        <div class="tool-wrap">
          <button id="color-btn" type="button" class="color-swatch-btn" style="background:#13293d"></button>
          <div class="tool-popup" id="color-popup">
            <input id="color" type="color" value="#13293d" />
            <button id="color-ok" type="button">OK</button>
          </div>
        </div>
        <div class="tool-wrap">
          <button id="brush-btn" type="button" class="tool-btn active">Brush</button>
          <div class="tool-popup" id="brush-popup">
            <input id="brush" type="range" min="1" max="24" value="4" />
            <span id="brush-value">4px</span>
          </div>
        </div>
        <div class="tool-wrap">
          <button id="eraser-btn" type="button" class="tool-btn">Eraser</button>
          <div class="tool-popup" id="eraser-popup">
            <input id="eraser-size" type="range" min="4" max="60" value="20" />
            <span id="eraser-size-value">20px</span>
          </div>
        </div>
        <button id="bucket-btn" type="button">Fill</button>
        <div class="controls-spacer"></div>
        <div class="tool-wrap">
          <button id="download-btn" type="button">Download</button>
          <div class="tool-popup" id="download-popup">
            <button id="dl-png" type="button">PNG (transparent)</button>
            <button id="dl-jpg" type="button">JPG (with background)</button>
          </div>
        </div>
        <button id="clear" type="button">Clear canvas</button>
      </section>

      <section class="canvas-stage">
        <canvas id="board"></canvas>
        <div id="eraser-cursor"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
